<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title | default: site_title_seo }}</title>
  <meta name="description" content="{{ page.description | default: site_description_seo }}"> 

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicons/favicon-96x96.png' | relative_url }}" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicons/favicon.svg' | relative_url }}" />
  <link rel="shortcut icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicons/apple-touch-icon.png' | relative_url }}" />
  <meta name="apple-mobile-web-app-title" content="W4VZEN" />
  <link rel="manifest" href="{{ '/assets/img/favicons/site.webmanifest' | relative_url }}" />

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/estilos.css' | relative_url }}">
</head>

<body>
  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <!-- JavaScript -->
  <script src="{{ '/assets/js/video.js' | relative_url }}"></script>
</body>
</html>
