<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Título y descripción -->
  <title>{{ page.title | default: site_title_seo }}</title>
  <meta name="description" content="{{ page.description | default: site_description_seo }}"> 

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="{{ page.title | default: site_title_seo }}">
  <meta property="og:description" content="{{ page.description | default: site_description_seo }}">
  <meta property="og:image" content="{{ '/assets/img/social-preview.jpg' | relative_url | absolute_url }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site_title_seo }}">
  <meta name="twitter:description" content="{{ page.description | default: site_description_seo }}">
  <meta name="twitter:image" content="{{ '/assets/img/social-preview.jpg' | relative_url | absolute_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicons/favicon-96x96.png' | relative_url }}" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicons/favicon.svg' | relative_url }}" />
  <link rel="shortcut icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicons/apple-touch-icon.png' | relative_url }}" />
  <meta name="apple-mobile-web-app-title" content="W4VZEN" />
  <link rel="manifest" href="{{ '/assets/img/favicons/site.webmanifest' | relative_url }}" />

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/estilos.css' | relative_url }}">
</head>

<body>
  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <!-- JavaScript -->
  <script src="{{ '/assets/js/video.js' | relative_url }}"></script>
</body>
</html>
